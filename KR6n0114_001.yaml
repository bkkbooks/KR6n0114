body:
  text: 陳那菩薩造唐三藏法師玄奘譯明蜀沙門明昱會釋觀者察義所緣者有境義緣者能引生識義謂觀察所緣之境亦能引生於識方是所緣緣也故論中云帶彼相起及從彼生釋論云凡是境者理須生其似自相識隨境之識彼是能生彼是所緣故知所緣緣者唯一色等法具足有境引生二義而餘乘別執極微者縱許引生闕有境義別執和合者縱許有境又無引生故論主令彼觀察二義斯備方可立宗諸有欲令眼等五識以外色作所緣緣者或執極微許有實體能生識故或執和合以識生時帶彼相故餘乘所執心境兩分謂離識外別有色等五塵與眼等識作所緣緣非意識故以彼意識唯緣假故釋論謂餘乘意云縱許意識緣實事境有其片分亦能將識相似之相離無其境於眼等識境不相離是知彼執外色等法唯與五識作所緣緣或執下彼許極微體無轉變是實有義體既實有則能生識故執極微作所緣緣釋論云或許極微雖復極微唯共聚已而見生滅然而實體一一皆緣不緣總聚猶如色等設自諸根悉皆現前境不雜亂彼根功能各決定故而於實事斷割有能一一極微成所緣境彼因性故彼眼等識之因性故是彼生起親友分義然而有説其所緣境是識生因在諸緣故引此以證極微為所緣緣也或執和合者彼許極微合聚為相而有所緣所緣實有必能生識故識生時帶彼相起是執和合為所緣緣也釋論云或復於彼為總聚者彼諸論者執衆極微所有合聚為此所緣相識生故由於總聚而生其智是故定知彼為所緣如有説云若識有彼相彼是此之境亦引此以證和合為所緣緣也二俱非理所以者何極微於五識設緣非所緣彼相識無故猶如眼根等論主總破前執極微和合為前五識所緣緣者俱非理也所以者何者徵釋非理之義極微下立比量破之極微是前陳有法於五識設緣非所緣為宗彼相識無故為因猶如眼根等為喻謂彼所執極微之體無轉變故許是實有於五識上設若許有生識之緣非是所緣之境以極微相眼等識上無故猶如眼等五根於眼等五識上無有所緣義故以眼不自見耳不自聞鼻不自嗅舌不自嘗身不自觸是謂五識上無五根之相以喻五識上無極微相狀者由彼極微至極微細名色邊際於眼等識力不能對故於極微説有生識緣而無所緣境也所緣緣者謂能緣識帶彼相起及有實體令能緣識託彼而生色等極微設有實體能生五識容有緣義然非所緣如眼根等於眼等識無彼相故如是極微於眼等識無所緣義將釋頌詞先明所緣緣正義謂能緣識帶彼相起者釋有所緣境也及有實體令能緣識託彼而生者釋有生識緣也以能緣見分及所緣相分同依自證分生不前不後同時起故應知識不自生生必帶相為所緣境相不自起起必引識作能緣心由此一法有二功能一能引識一作所緣故名所緣而又名緣也色等下正釋頌詞色等極微至然非所緣者釋前二句所立之宗如眼根等至無彼相故者釋後二句因喻之義如是極微至無所緣義者結顯緣義容有必無所緣境也和合於五識設所緣非緣彼體實無故猶如第二月論主立量破第二執義和合是前陳有法於五識設所緣非緣為宗彼體實無故為因猶如第二月為喻謂彼所執和合之法合聚為相形顯現故説為有境於五識上設若許有所緣之境非是生識之緣以彼和合體無實故如第二月者以是揑目錯亂現故以喻和合元非實有衆微合聚有假相生故説設許所緣而非緣義色等和合於眼識等有彼相故設作所緣然無緣義如眼錯亂見第二月彼無實體不能生故如是和合於眼等識無有緣義釋上頌意謂執色等諸和合相於眼識等設許有彼和合相現有是所緣然而和合其體非實無有緣義如於眼中錯亂見有第二月相彼非實有以喻和合亦非實有不能生識故無緣義故外二事於所緣緣互闕一支俱不應理結成前執二義非理外二事者即前所執極微和合離識別有故云外事於所緣緣互闕一支者謂於極微闕所緣境於彼和合闕生識緣故外二事俱不應理釋論云離識之外執有二種極微總聚此皆闕其一分義故自體相現及能生性具斯二分方是所緣於極微處即闕初支即前自體相現於第二通便亡第二即前及能生性若如是者如向所論二種過失重更收攝令使無差論釋記云此乃警其勿犯耳有執色等各有多相於中一分是現量境故諸極微相資各有一和集相此相實有各能發生似已相識故與五識作所緣緣由前論主於極微處許能生識於和合處許作所緣故餘乘轉計云前許極微有生識緣又許和合為所緣境今推極微體中具和集義故諸極微有和合相即將極微能引生識體具和集即作所緣二義斯備其必無失今言有執色等者等於聲香味觸五塵也各有多相者謂色有青黃等相聲有清濁等相香有好惡等相味有甜苦等相觸有冷暖等相於中一分是現量境者謂於五塵極微體中各具一分和集是現量境故諸下謂由極微體具和集故諸極微彼此相資於五塵中各有一分和集相現此相實有各能發生似已相識者是説極微體具和集能與五識作所緣緣此亦非理所以者何和集如堅等設於眼等識是緣非所緣許極微相故論主復立比量破彼轉計和集是前陳有法設於眼等識是緣非所緣為宗許極微相故為因如堅等為喻謂彼所執極微體具和集相者猶如堅濕暖動等相非眼所見無所緣義故立宗云設於眼等識上許是生識之緣無所緣性以許極微體具和集元是極微一體相故如堅等相雖是實有於眼等識容有緣義而非所緣眼等識上無彼相故色等極微諸和集相理亦應爾彼俱執為極微相故釋上頌意堅濕暖動四大性也地水火風四大相也堅等能造地等方現故知堅等性之相狀是實有體於眼等識容有緣義而非所緣眼等識上無彼堅等相狀性故者以堅濕等唯住性位不同地等相貌顯現色等下以法合喻謂非極微體具和集許是實有容有緣義而非所緣眼等識上無極微體具和集相故故云亦爾由執和集不離極微故復責云彼俱執為極微相故執眼等識能緣極微諸和集相復有別生由前轉計極微體具和集之相為所緣緣論主以如堅等喻破之謂彼所執俱是極微相狀性故無所緣義故復轉計和集之相即是極微相顯現故有是所緣體是極微復能生識今言執眼等識能緣極微諸和集相者謂諸五塵和集之相皆是極微合聚為體體能生識故緣彼極微和集差別之相復能引生差別識者識生似境故故云復有別生瓶甌等覺相彼執應無別非形別故別形別非實故論主説頌破前執意初句牒彼執意彼謂瓶甌等形有別所生覺相亦有差別第二句總破謂所緣瓶甌雖有差別能緣覺相應無有別以前唯許極微能生識故後二句釋成謂瓶甌之形既非實有不能引生能緣覺相故云非形別故覺相亦別以彼形別非實有故瓶甌等物大小等者能成極微多少同故緣彼覺相應無差別若謂彼形物相別故覺相別者理亦不然瓨等別形唯在瓶等假法上有非極微故釋上頌意瓶甌等者等物之多大小等者等形之別此釋所緣有差別也能成極微多少同故者多能成大少能成小極微本同此釋生識緣無差別緣彼覺相應無差別者彼執和集為境極微生識極微既同所生覺相應無差別若謂下牒彼執意以釋第三句為破詞故云理亦不然瓨等下釋第四句成上第三句義瓨字音缸長頸瓶也譯師以瓨瓶二字互用彼不應執極微亦有差別形相所以者何極微量等故形別唯在假析彼至極微彼覺定捨故恐彼轉計極微亦有差別形相故先抑云彼不應等所以者何徵釋極微無別之義頌中初句謂能成極微隨有多少其量皆等無差別故次句破彼形別唯假不能生識後二句釋成次句謂析彼形至於極微緣彼別形所生覺相決定捨故非瓶甌等能成極微有形量別捨微圓相故知別形在假非實又形別物析至極微彼覺定捨非青等物析至極微彼覺可捨由此形別唯世俗有非如青等亦在實物是故五識所緣緣體非外色等其理極成釋上頌意謂非瓶甌有形量別即捨能成極微圓滿之相以彼極微無轉變故故知別形在假非實者釋次句又形別物析至極微彼覺定捨者釋後二句非青等物析至極微彼覺可捨者例顯謂形猶可析色不可分猶可析故應知是假不可分故亦在實物是故下結顯內色為所緣緣其理極成彼所緣緣豈全不有非全不有若爾云何內色如外現為識所緣緣許彼相在識及能生識故前破外執之非此明內色為正故復問云彼前五識所緣緣法豈全不有答云非全不有若爾云何者牒徵非全不有之義頌中依內色立宗顯示大乘所緣緣義內色為前陳有法為識所緣緣為宗許彼相在識及能生識故為因如外現為喻頌中前二句謂內相分如彼所執心外有法而顯現故與前五識作所緣緣釋論云此中內聲為顯不離於識而有所緣由諸世俗共許於境在外而住應云如外此不離識應知色無內外執者自外以對外故復有內名若不執外內亦不名內外俱泯成唯識義後二句如次釋成所緣緣義許彼相在識者有所緣也及能生識故者有緣義也外境雖無而有內色似外境現為所緣緣許眼等識帶彼相起及從彼生具二義故外境雖無者牒前已破極微和合理非有也而有內色似外境現為所緣緣者釋頌中前二句許眼等識帶彼相起及從彼生者釋後二句帶彼相起釋所緣及從彼生釋緣義故云具二義故此內境相既不離識如何俱起能作識緣餘乘問內境相分既不離識與識俱起如何俱起能作識緣何則要前引後方有緣義決定相隨故俱時亦作緣或前為後緣引彼功能故論主答謂境與識決定相隨雖俱時起亦能作緣引生於識若不引生不名俱起及相隨義後二句就問中前後義答謂或能引前識功能即為引生後識緣故如眼緣色色中功能引識同起識即緣色前眼識滅後識生時亦是能引前識功能即能引生後識緣境故説前為後緣引彼識起是功能故境相與識定相隨故雖俱時起亦作識緣因明者説若此與彼有無相隨雖俱時生而亦得有因果相故或前識相為後識緣引本識中生似自果功能令起不違理故境相下釋頌中前二句因明下引證謂彼説言若此相分與彼見分有無相隨雖俱時生而亦得有相分為因見分為果的義言有無相隨者有即相見二分住現行時無即相見二分居種子時住現行時彼彼有用種子位中彼彼用無此説相分見分若現若種決定相隨是不離義或前下釋後二句本識即第八識似自果者謂眼根引生眼識乃至身根引生身識名為自果是以眼等為因生識為果意謂引本識中生似自果者乃是五根功能令起不違理故若五識生唯緣內色如何亦説眼等為緣餘乘問謂若五識唯緣內色即得生起如何餘處亦説眼等五根為緣方得生識識上色功能名五根應理功能與境色無始互為因論主答前二句以明根境俱屬色故故言色時根境俱彰謂本識上有相分色五識所緣名五塵境色中功能引生五識名為五根應當正理後二句明互為因謂五根功能與五境色從無始來更互為因功能為因引生境色境色為因引起功能是更互為因的義以能發識比知有根此但功能非外所造故本識上五色功能名眼等根亦不違理功能發識理無別故在識在餘雖不可説而外諸法理非有故定應許此在識非餘此根功能與前境色從無始際展轉為因謂此功能至成熟位生現識上五內境色此內境色復能引起異熟識上五根功能根境二色與識一異或非一異隨樂應説如是諸識唯內境相為所緣緣理善成立以能發識比知有根者謂根非現量唯比量可知此但功能非外所造者謂根與境不同處故發識功能名為內處即是五根所緣之境名為外處即是五塵以外所造名為塵義故本下正釋前二句功能發識理無別故者謂發識功能名勝義根但取發識即名為根更無別義在識在餘雖不可説者謂色不離識名為在識心外有法名為在餘不論內色外色唯取發識名勝義根故云雖不可説然而心外執有極微和合諸法以理推之既非實有定應許此發識之色在識非餘此根下釋後二句謂此下釋成展轉為因的義成熟位者即此果報已熟位也謂由五根功能於果報位生起現識體上五內境色名相分色由內境色復能引起當來異熟果上五根功能名勝義根前云外所造今云內境色者前分根境故説外造此不離識故名內境釋論云此中內聲言不離識本無其外望誰為內故知內外之名隨情假立根境下顯示唯識義謂根境識三即相見分同自證分故名為一色心各別復名為異同體用別名為非一用別體同又名非異諦了唯識隨樂應説苟非諦了逐觸成邪如是下結顯內色為所緣緣理善成立意破餘乘妄執心外極微和合為所緣緣俱非理也
